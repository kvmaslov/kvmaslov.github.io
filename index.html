<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>VK Mini App Token</title>
    <!-- Подключаем VK Bridge через CDN -->
    <script src="https://unpkg.com/@vkontakte/vkbridge/dist/vkbridge.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Roboto', 'Segoe UI', sans-serif;
            background-color: var(--vkui--color_background);
            color: var(--vkui--color_text_primary);
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        h1 {
            margin-bottom: 24px;
            text-align: center;
        }
        button {
            background-color: var(--vkui--color_background_accent);
            color: var(--vkui--color_text_primary_inverted);
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        button:not(:disabled):hover {
            opacity: 0.9;
        }
        .status {
            margin-top: 16px;
            font-size: 14px;
            color: var(--vkui--color_text_secondary);
            text-align: center;
        }
        .log {
            margin-top: 16px;
            font-size: 12px;
            color: #888;
            background: rgba(0,0,0,0.05);
            padding: 8px;
            border-radius: 8px;
            max-width: 100%;
            word-break: break-all;
            display: none;
        }
    </style>
</head>
<body>
    <h1>Получение токена для опросов</h1>

    <button id="btn" disabled>Ожидание инициализации...</button>

    <p class="status">Загрузка VK Bridge...</p>
    <div id="log" class="log"></div>
