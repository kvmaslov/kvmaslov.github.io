<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <title>VK Test</title>
    <!-- Подключаем мост -->
    <script src="https://unpkg.com/@vkontakte/vkbridge/dist/vkbridge.js"></script>
</head>
<body>
    <h1 id="status">Загрузка...</h1>
    <button id="btn" disabled style="padding: 10px; display: block; margin-top: 10px;">Получить токен</button>
    <pre id="log" style="margin-top: 10px; font-size: 12px; background: #eee; padding: 10px; display: none;"></pre>

    <script>
        // 1. Отправляем инициализацию сразу
        const bridge = VKBridge.send('VKWebAppInit');

        // 2. Ловим ВСЕ ответы
        bridge.receive((data) => {
            const statusEl = document.getElementById('status');
            const btn = document.getElementById('btn');
            const log = document.getElementById('log');

            if (data.type === 'VKWebAppInit') {
                console.log('✅ Инициализация прошла успешно!');
                statusEl.textContent = '✅ VK Bridge готов!';
                btn.disabled = false;
                btn.textContent = '🔑 Получить токен для опросов';
            } 
            else if (data.type === 'VKWebAppGetAuthTokenResult') {
                const token = data.detail.access_token;
                console.log('🔑 ТОКЕН:', token);
                statusEl.textContent = 'Токен получен (см. консоль)';
                log.style.display = 'block';
                log.textContent = 'Токен:\n' + token;
                alert('Токен скопирован в консоль (F12). Не показывай его никому!');
            }
            else if (data.type === 'VKWebAppError') {
                console.error('❌ Ошибка VK:', data.detail);
                statusEl.textContent = 'Ошибка: ' + (data.detail.error_msg || 'Неизвестная ошибка');
                alert('Ошибка: ' + (data.detail.error_msg || 'См. консоль F12'));
            }
        });

        // 3. Вешаем клик только когда кнопка активна
        document.getElementById('btn').addEventListener('click', () => {
            console.log('🖱️ Запрос токена...');
            VKBridge.send('VKWebAppGetAuthToken', {
                group_id: 239900520, 
                scope: 'wall,polls,offline'
            });
        });
    </script>
</body>
</html>
