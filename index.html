<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>VK Mini App Token</title>
    <!-- Подключаем VK Bridge через CDN (локальный файл не нужен) -->
    <script src="https://unpkg.com/@vkontakte/vkbridge/dist/vkbridge.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Roboto', 'Segoe UI', sans-serif;
            background-color: var(--vkui--color_background);
            color: var(--vkui--color_text_primary);
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        h1 {
            margin-bottom: 24px;
            text-align: center;
        }
        button {
            background-color: var(--vkui--color_background_accent);
            color: var(--vkui--color_text_primary_inverted);
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        button:not(:disabled):hover {
            opacity: 0.9;
        }
        .status {
            margin-top: 16px;
            font-size: 14px;
            color: var(--vkui--color_text_secondary);
            text-align: center;
        }
        .log {
            margin-top: 16px;
            font-size: 12px;
            color: #888;
            background: rgba(0,0,0,0.05);
            padding: 8px;
            border-radius: 8px;
            max-width: 100%;
            word-break: break-all;
            display: none; /* По умолчанию скрыт */
        }
    </style>
</head>
<body>
    <h1>Получение токена для опросов</h1>

    <!-- Кнопка изначально неактивна — это нормально, пока не загрузится VK Bridge -->
    <button id="btn" disabled>Получить токен</button>

    <p class="status">Ожидание инициализации VK Bridge...</p>
    <div id="log" class="log"></div>

    <script>
        // Ссылка на глобальный объект VKBridge
        const VKBridge = window.vkBridge;

        // 1. Инициализируем соединение с VK Bridge
        VKBridge.send('VKWebAppInit');

        // 2. Слушаем событие инициализации
        VKBridge.on('VKWebAppInitResult', (e) => {
            console.log('✅ VK Bridge успешно инициализирован!', e);
            
            const btn = document.getElementById('btn');
            const status = document.querySelector('.status');
            const log = document.getElementById('log');

            // Активируем кнопку
            btn.disabled = false;
            btn.textContent = '✅ Токен готов, нажать для получения';
            status.textContent = 'VK Bridge готов. Нажмите кнопку.';

            // 3. Вешаем обработчик клика на кнопку
            btn.addEventListener('click', () => {
                console.log('🖱️ Кнопка нажата. Отправляем запрос на токен...');
                
                // ВАЖНО: замени group_id на ID своей группы ВКонтакте
                VKBridge.send('VKWebAppGetAuthToken', {
                    group_id: 239900520, 
                    scope: 'wall,polls,offline'
                });
            });
        });

        // 4. Обработка успешного получения токена
        VKBridge.on('VKWebAppGetAuthTokenResult', (e) => {
            const token = e.detail.access_token;
            const log = document.getElementById('log');

            console.log('🔑 ТОКЕН ДЛЯ N8N:', token);
            
            // Показываем токен в блоке на странице (для удобства)
            log.style.display = 'block';
            log.textContent = 'Токен: ' + token;

            // Выводим предупреждение — токен нужно скопировать из консоли (F12)
            alert('Скопируй токен из консоли браузера (F12 → Console):\n' + token);
        });

        // 5. Обработка любых ошибок
        VKBridge.on('VKWebAppError', (e) => {
            console.error('❌ Ошибка VK Bridge:', e);
            alert('Ошибка: ' + JSON.stringify(e.detail));
        });
    </script>
</body>
</html>
