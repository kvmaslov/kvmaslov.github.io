<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>VK Mini App Token</title>
    <!-- ВАЖНО: Используем официальный скрипт от VK вместо unpkg.com -->
    <script src="https://vk.com/js/api/vk_bridge.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Roboto', 'Segoe UI', sans-serif;
            background-color: #fff;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        h1 { text-align: center; color: #0077FF; }
        button {
            padding: 12px 24px;
            background-color: #0077FF;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        .status { margin-top: 15px; text-align: center; font-size: 14px; color: #666; }
        .log {
            margin-top: 15px;
            padding: 10px;
            background: #f4f4f4;
            border-radius: 4px;
            font-size: 12px;
            display: none;
            word-break: break-all;
            max-width: 100%;
        }
    </style>
</head>
<body>
    <h1>Получение токена</h1>
    <p class="status" id="status">Загрузка моста VK Bridge...</p>
    <button id="btn" disabled>Получить токен</button>
    <div id="log" class="log"></div>

    <script>
        // Функция-защита: ждём, пока появится объект VKBridge
        function waitForBridge() {
            if (typeof VKBridge !== 'undefined') {
                console.log('✅ VK Bridge успешно загружен!');
                initApp();
            } else {
                console.log('⏳ Ожидание загрузки VK Bridge...');
                setTimeout(waitForBridge, 200); // Проверяем каждые 200 мс
            }
        }

        function initApp() {
            const statusEl = document.getElementById('status');
            const btn = document.getElementById('btn');
            const logEl = document.getElementById('log');

            // Отправляем запрос на инициализацию приложения
            const bridge = VKBridge.send('VKWebAppInit');

            // Слушаем все ответы от VK
            bridge.receive((data) => {
                if (data.type === 'VKWebAppInit') {
                    console.log('✅ Приложение инициализировано платформой VK!');
                    statusEl.textContent = '✅ VK Bridge готов. Нажмите кнопку.';
                    btn.disabled = false;
                    btn.textContent = '🔑 Получить токен для опросов';
                } 
                else if (data.type === 'VKWebAppGetAuthTokenResult') {
                    const token = data.detail.access_token;
                    console.log('🔑 ТОКЕН ПОЛУЧЕН:', token);
                    statusEl.textContent = 'Токен получен (см. консоль)';
                    logEl.style.display = 'block';
                    logEl.textContent = 'Токен скопирован в консоль (F12).';
                    alert('Токен получен! Скопируйте его из консоли браузера (F12).');
                }
                else if (data.type === 'VKWebAppError') {
                    console.error('❌ Ошибка VK:', data.detail);
                    statusEl.textContent = 'Ошибка: ' + (data.detail.error_msg || 'Неизвестная ошибка');
                    alert('Ошибка: ' + (data.detail.error_msg || 'См. консоль F12'));
                }
            });

            // Вешаем обработчик клика
            btn.addEventListener('click', () => {
                console.log('🖱️ Запрос токена...');
                VKBridge.send('VKWebAppGetAuthToken', {
                    group_id: 239900520, 
                    scope: 'wall,polls,offline'
                });
            });
        }

        // Запускаем проверку сразу
        waitForBridge();
    </script>
</body>
</html>
